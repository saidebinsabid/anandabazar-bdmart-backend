# ═════════════════════════════════════════════════════════════════════
#   Render Blueprint — Anandabazar BDMart backend (long-running Node)
# ═════════════════════════════════════════════════════════════════════
# Deploy: Render Dashboard → New → Blueprint → connect this repo → Apply.
# Values marked `sync: false` are secrets: fill them in the Render dashboard
# after the service is created (they are never committed here).
#
# Unlike Vercel serverless, Render runs a persistent process, so Socket.IO
# real-time push and the courier auto-sync cron BOTH work here.
# ═════════════════════════════════════════════════════════════════════
services:
  - type: web
    name: anandabazar-bdmart-backend
    runtime: node
    plan: free                 # upgrade to "starter" to avoid 15-min sleep + keep the cron alive
    region: singapore          # closest Render region to Bangladesh
    branch: main
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      # Render provides PORT automatically — do NOT set it here.
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      # ── Database (REQUIRED) ──
      - key: DATABASE_URL
        sync: false
      # ── JWT (REQUIRED) ──
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRES_IN
        value: 1d
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: BCRYPT_SALT_ROUNDS
        value: "12"
      # ── Public URLs ──
      - key: FRONTEND_URL
        sync: false            # your deployed client URL (for CORS + links)
      - key: BACKEND_URL
        sync: false            # this service's own Render URL
      # ── Cloudinary (recommended — persists uploads across redeploys) ──
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      # ── Email / SMTP (optional) ──
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        value: noreply@anandabazarbdmart.com
      # ── Google OAuth (optional) ──
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      # ── bKash (optional — blank = sandbox) ──
      - key: BKASH_APP_KEY
        sync: false
      - key: BKASH_APP_SECRET
        sync: false
      - key: BKASH_USERNAME
        sync: false
      - key: BKASH_PASSWORD
        sync: false
      - key: BKASH_BASE_URL
        value: https://tokenized.sandbox.bka.sh/v1.2.0-beta
      - key: BKASH_SANDBOX
        value: "true"
      # ── SSLCommerz (optional — blank = sandbox) ──
      - key: SSLCZ_STORE_ID
        sync: false
      - key: SSLCZ_STORE_PASSWD
        sync: false
      - key: SSLCZ_SANDBOX
        value: "true"
      - key: PAYMENT_BACKEND_URL
        sync: false
      - key: PAYMENT_FRONTEND_URL
        sync: false
      # ── Steadfast courier (optional) ──
      - key: STEADFAST_API_KEY
        sync: false
      - key: STEADFAST_SECRET_KEY
        sync: false
      - key: STEADFAST_BASE_URL
        value: https://portal.packzy.com/api/v1
      - key: STEADFAST_WEBHOOK_SECRET
        sync: false
      # On Render (persistent process) the auto-sync cron works — set to "true" to enable.
      - key: STEADFAST_AUTO_SYNC
        value: "false"
      - key: STEADFAST_AUTO_SYNC_MINUTES
        value: "30"
      # ── Nagad (optional — fill keys + set NAGAD_LIVE=true to go live) ──
      - key: NAGAD_MERCHANT_ID
        sync: false
      - key: NAGAD_MERCHANT_NUMBER
        sync: false
      - key: NAGAD_PUBLIC_KEY
        sync: false
      - key: NAGAD_PRIVATE_KEY
        sync: false
      - key: NAGAD_BASE_URL
        value: https://sandbox-ssl.mynagad.com/api/dfs
      - key: NAGAD_SANDBOX
        value: "true"
      - key: NAGAD_LIVE
        value: "false"
      # ── Rocket / DBBL (optional — fill keys + set ROCKET_LIVE=true to go live) ──
      - key: ROCKET_MERCHANT_ID
        sync: false
      - key: ROCKET_API_KEY
        sync: false
      - key: ROCKET_API_SECRET
        sync: false
      - key: ROCKET_BASE_URL
        sync: false
      - key: ROCKET_SANDBOX
        value: "true"
      - key: ROCKET_LIVE
        value: "false"
